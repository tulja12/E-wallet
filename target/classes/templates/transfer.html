<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Transfer Money</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Transfer Money</h2>

    <div class="d-flex justify-content-center">

        <form th:action="@{/transfer}" method="post" class="card p-4 shadow" style="width:350px">

            <div class="mb-3">
                <label class="form-label">Receiver Username</label>
                <input
                        type="text"
                        name="receiver"
                        class="form-control"
                        placeholder="Enter receiver username"
                        required>
            </div>

            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input
                        type="number"
                        name="amount"
                        class="form-control"
                        placeholder="Enter amount"
                        required>
            </div>

            <button type="submit" class="btn btn-warning w-100">
                Transfer
            </button>

        </form>

    </div>

    <div class="text-center mt-4">
        <a th:href="@{/dashboard}">Back to Dashboard</a>
    </div>

</div>

</body>
</html>
