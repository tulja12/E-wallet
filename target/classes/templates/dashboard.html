<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center page-title mb-4">Dashboard</h2>

    <div class="card wallet-card shadow p-4 text-center mb-4">

        <h5>Wallet Balance</h5>

        <div class="wallet-balance">
            ₹<span th:text="${balance}"></span>
        </div>

    </div>

    <div class="row text-center">

        <div class="col-md-4">
            <a href="/add-money" class="btn btn-success w-100 shadow">
                Add Money
            </a>
        </div>

        <div class="col-md-4">
            <a href="/transfer" class="btn btn-warning w-100 shadow">
                Transfer Money
            </a>
        </div>

        <div class="col-md-4">
            <a href="/transactions" class="btn btn-info w-100 shadow">
                Transaction History
            </a>
        </div>

    </div>

    <div class="text-center mt-5">
        <a href="/" class="btn btn-danger">Logout</a>
    </div>

</div>

</body>
</html>
