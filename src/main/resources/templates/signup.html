<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Signup</h2>

    <div class="d-flex justify-content-center">

        <form th:action="@{/signup}" method="post" class="card p-4 shadow" style="width:350px">

            <div class="mb-3">
                <label>Name</label>
                <input
                        type="text"
                        name="name"
                        class="form-control"
                        autocomplete="name"
                        minlength="3"
                        required>
            </div>

            <div class="mb-3">
                <label>Enter Email</label>
                <input
                        type="email"
                        name="email"
                        class="form-control"
                        autocomplete="email"
                        required>
            </div>

            <div class="mb-3">
                <label>Enter Phone Number</label>
                <input
                        type="tel"
                        name="phone"
                        class="form-control"
                        autocomplete="tel"
                        maxlength="10"
                        required>
            </div>

            <div class="mb-3">
                <label>Username</label>
                <input
                        type="text"
                        name="username"
                        class="form-control"
                        required
                        minlength="4"
                        maxlength="20"
                        pattern="[A-Za-z0-9]+"
                        title="Username must contain only letters and numbers">
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input
                        type="password"
                        name="passkey"
                        class="form-control"
                        autocomplete="new-password"
                        required
                        minlength="6">
            </div>

            <div class="mb-3">
                <label>Confirm Password</label>
                <input
                        type="password"
                        name="confirmPassword"
                        class="form-control"
                        autocomplete="new-password"
                        required
                        minlength="6">
            </div>

            <button class="btn btn-success w-100">
                Register
            </button>

            <div class="text-center mt-3">
                <a th:href="@{/}">Back to Login</a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
